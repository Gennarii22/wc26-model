name: Aggiorna modello Mondiale

# Durante il torneo le partite cadono in finestre lungo tutta la giornata.
# I cron di GitHub sono BEST-EFFORT: all'ora tonda (es. 09:00) e quando un repo
# ha pochi slot/giorno vengono spesso ritardati o SALTATI (il 17/06 sono stati
# saltati ENTRAMBI gli slot → dati fermi tutto il giorno). Difesa: TANTI slot
# distribuiti, a minuti DISPARI fuori dall'ora. Se GitHub ne salta qualcuno,
# gli altri girano e i dati non restano mai fermi a lungo (idempotente: se non
# ci sono partite nuove, il commit è vuoto e non cambia nulla).
# Orari UTC (estate IT = UTC+2): 09:23→11:23 IT, 12:23→14:23, 15:23→17:23,
# 18:23→20:23, 21:23→23:23, 23:43→01:43 (dopo le gare serali USA).
# Scarica i risultati (ESPN), ri-simula, rigenera le dashboard, committa → Netlify ripubblica.
on:
  schedule:
    - cron: '23 9 * * *'
    - cron: '23 12 * * *'
    - cron: '23 15 * * *'
    - cron: '23 18 * * *'
    - cron: '23 21 * * *'
    - cron: '43 23 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Installa dipendenze
        run: pip install -r requirements.txt

      - name: Snapshot probabilità (per i delta dei post X)
        run: cp model/team_probs.csv model/team_probs_before.csv || true

      - name: Rigenera il modello
        run: |
          cd model
          python update_tournament.py
          python simulate.py
          python espn_goals.py
          python top_scorer_v2.py
          python gen_dashboard.py
          python gen_betting.py
          cp dashboard_data.js betting_data.js ../site/

      - name: Genera e pubblica post su X
        continue-on-error: true
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_SECRET: ${{ secrets.X_ACCESS_SECRET }}
        run: |
          cd model
          python wc_x_engine.py --n 2 --post

      - name: Commit & push (se ci sono cambiamenti)
        run: |
          git config user.name "wc26-bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "auto-update modello $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
