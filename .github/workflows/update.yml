name: Aggiorna modello Mondiale

# Gira ogni mattina ~11:17 ora italiana (= 09:17 UTC, ora legale estate).
# Minuto DISPARI fuori dall'ora: i cron GitHub all'ora tonda (es. 09:00) sono
# molto congestionati e vengono spesso ritardati o SALTATI. Off-the-hour = affidabile.
# Secondo slot 13:17 IT come rete di sicurezza se il primo viene saltato.
# Scarica i risultati (ESPN), ri-simula, rigenera le dashboard, committa → Netlify ripubblica.
on:
  schedule:
    - cron: '17 9 * * *'
    - cron: '17 11 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Installa dipendenze
        run: pip install -r requirements.txt

      - name: Snapshot probabilità (per i delta dei post X)
        run: cp model/team_probs.csv model/team_probs_before.csv || true

      - name: Rigenera il modello
        run: |
          cd model
          python update_tournament.py
          python simulate.py
          python espn_goals.py
          python top_scorer_v2.py
          python gen_dashboard.py
          python gen_betting.py
          cp dashboard_data.js betting_data.js ../site/

      - name: Genera e pubblica post su X
        continue-on-error: true
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_SECRET: ${{ secrets.X_ACCESS_SECRET }}
        run: |
          cd model
          python wc_x_engine.py --n 2 --post

      - name: Commit & push (se ci sono cambiamenti)
        run: |
          git config user.name "wc26-bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "auto-update modello $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
