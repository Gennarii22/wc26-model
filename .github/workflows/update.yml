name: Aggiorna modello Mondiale

# UN SOLO loop ogni 30 minuti, 24/7. Fa tutto in sequenza (niente gara tra workflow):
#  1) snapshot probabilita' (per i delta post-partita)
#  2) refresh modello (risultati ESPN -> ri-simula 20k -> dashboard). La sim e' SEEDATA
#     (default_rng 42): se non ci sono partite nuove l'output e' identico = commit vuoto,
#     niente jitter dei numeri.
#  3) post-partita su X: solo se un match e' finito DA POCO e c'e' un edge (recency + 6 regole)
#  4) pre-partita su X: solo se un match inizia tra ~20 e ~80 min
#  5) push sicuro (anti-race; vince chi ha piu' risultati sui file-dati)
# Repo pubblica = minuti Actions illimitati. Copertura 24/7 perche' il Mondiale e' negli
# USA: i match 00:00-06:00 UTC sono la sera/prime-time americana (pubblico principale).
on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Installa dipendenze
        run: pip install -r requirements.txt tweepy

      - name: Snapshot probabilita' (per i delta post-partita)
        run: cp model/team_probs.csv model/team_probs_before.csv || true

      - name: Rigenera il modello
        run: |
          cd model
          python update_tournament.py
          python simulate.py
          python espn_goals.py
          python top_scorer_v2.py
          python gen_dashboard.py
          python gen_betting.py
          cp dashboard_data.js betting_data.js ../site/

      - name: Post-partita su X (recency + 6 regole, posta solo se c'e' un edge)
        continue-on-error: true
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_SECRET: ${{ secrets.X_ACCESS_SECRET }}
        run: |
          cd model
          python wc_x_engine.py --n 1 --post

      - name: Pre-partita su X (solo se un match inizia tra ~20 e ~80 min)
        continue-on-error: true
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_SECRET: ${{ secrets.X_ACCESS_SECRET }}
        run: |
          cd model
          python wc_x_engine.py --prematch --n 1 --post

      - name: Commit e push sicuro (anti-race, vince chi ha piu risultati)
        run: |
          git config user.name "wc26-bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config pull.rebase true
          bash safe_push.sh "auto-update modello $(date -u +'%Y-%m-%d %H:%M UTC')"
