name: Aggiorna modello Mondiale

# Durante il torneo le partite cadono in finestre lungo tutta la giornata.
# I cron di GitHub sono BEST-EFFORT: all'ora tonda (es. 09:00) e quando un repo
# ha pochi slot/giorno vengono spesso ritardati o SALTATI (il 17/06 sono stati
# saltati ENTRAMBI gli slot → dati fermi tutto il giorno). Difesa: TANTI slot
# distribuiti, a minuti DISPARI fuori dall'ora. Se GitHub ne salta qualcuno,
# gli altri girano e i dati non restano mai fermi a lungo (idempotente: se non
# ci sono partite nuove, il commit è vuoto e non cambia nulla).
# Copertura 24/7: il Mondiale e' negli USA, quindi i match 00:00-06:00 UTC sono
# la SERA/prime-time americana (il pubblico principale). Niente buco notturno: il
# dashboard deve aggiornarsi anche dopo le gare in orario USA. ~ogni 3h.
# Orari UTC (estate IT = UTC+2): 02:23→04:23 IT, 05:23→07:23, 09:23→11:23,
# 12:23→14:23, 15:23→17:23, 18:23→20:23, 21:23→23:23, 23:43→01:43.
# Scarica i risultati (ESPN), ri-simula, rigenera le dashboard, committa → Netlify ripubblica.
on:
  schedule:
    - cron: '23 2 * * *'
    - cron: '23 5 * * *'
    - cron: '23 9 * * *'
    - cron: '23 12 * * *'
    - cron: '23 15 * * *'
    - cron: '23 18 * * *'
    - cron: '23 21 * * *'
    - cron: '43 23 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Installa dipendenze
        run: pip install -r requirements.txt

      - name: Rigenera il modello
        run: |
          cd model
          python update_tournament.py
          python simulate.py
          python espn_goals.py
          python top_scorer_v2.py
          python gen_dashboard.py
          python gen_betting.py
          cp dashboard_data.js betting_data.js ../site/

      - name: Commit e push sicuro (anti-race, vince chi ha piu risultati)
        run: |
          git config user.name "wc26-bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config pull.rebase true
          bash safe_push.sh "auto-update modello $(date -u +'%Y-%m-%d %H:%M UTC')"
